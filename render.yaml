services:
  - type: web
    name: armando-bot
    env: node
    plan: free
    buildCommand: apt-get install -y ffmpeg fonts-liberation && pip3 install Pillow imageio imageio-ffmpeg numpy && npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        value: d7iUPfamAaPlSBNj6IhT
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: BLAND_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GHL_AGENCY_KEY
        sync: false
      - key: PAGESPEED_API_KEY
        value: AIzaSyA2AGHiDC1CCRcWKK8KFQq0i02uzOUGqaM
      - key: SEARCH_CONSOLE_API_KEY
        value: AIzaSyB5bO7Qmy8B-rHoSDjRY3gCZr9tpvYBfaY
