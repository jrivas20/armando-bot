<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thank You — Luis A. Farrera Tattoo</title>

<!-- ── GHL FULL BLEED OVERRIDE — Required on every GHL page ── -->
<style>
html, body,
.page-section, .page-section--content,
.funnelish-section, .funnelish-section--content,
.section-wrap, .section-wrap--content,
.hl_page-section, .hl_page-section--content,
.container, .container-fluid,
.row, .col, [class*="col-"],
[class*="section"], [class*="container"],
[class*="wrapper"], [class*="inner"],
[class*="page-section"], [class*="hl_"] {
  max-width: 100% !important;
  width: 100% !important;
  padding-left: 0 !important;
  padding-right: 0 !important;
  margin-left: 0 !important;
  margin-right: 0 !important;
  box-sizing: border-box !important;
}
body { overflow-x: hidden !important; }
</style>
<!-- ── END GHL FULL BLEED ── -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050505;
  --text: #f4f1eb;
  --muted: rgba(244,241,235,.62);
  --soft: rgba(244,241,235,.35);
  --line: rgba(255,255,255,.08);
  --gold: #cfa947;
  --gold2: #e2c66f;
  --display: 'Bebas Neue', sans-serif;
  --body: 'Inter', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ── HEADER — identical to consent form ── */
.cf-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5,5,5,.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}

.cf-header-in {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.cf-brand { display: flex; flex-direction: column; gap: 4px; }

.cf-brand-name {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.cf-brand-sub {
  font-family: var(--body);
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold2);
  line-height: 1;
}

.cf-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--soft);
}

.cf-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

/* ── GOLD DIVIDER ── */
.cf-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* ── MAIN ── */
.ty-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
}

.ty-card {
  text-align: center;
  max-width: 480px;
  width: 100%;
  animation: tyFade .55s ease both;
}

/* Gold check icon */
.ty-icon {
  width: 58px;
  height: 58px;
  margin: 0 auto 28px;
  border: 1px solid rgba(207,169,71,.28);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ty-icon svg {
  width: 24px;
  height: 24px;
  stroke: var(--gold2);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.ty-headline {
  font-family: var(--display);
  font-size: clamp(56px, 12vw, 104px);
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: .88;
  color: var(--text);
  margin-bottom: 20px;
}

.ty-rule {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 0 auto 20px;
  opacity: .45;
}

.ty-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 36px;
}

.ty-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 32px;
  font-family: var(--body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid var(--gold);
  color: var(--gold2);
  background: transparent;
  transition: .22s ease;
}

.ty-btn:hover {
  background: var(--gold);
  color: #111;
}

/* ── FOOTER ── */
.cf-footer {
  text-align: center;
  padding: 20px 24px 32px;
  border-top: 1px solid var(--line);
}

.cf-footer p {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--soft);
}

.cf-footer span { color: var(--gold2); }

/* ── ANIMATION ── */
@keyframes tyFade {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .cf-header-in { padding: 0 16px; min-height: 56px; }
  .cf-brand-name { font-size: 15px; letter-spacing: 2px; }
  .cf-badge { display: none; }
  .ty-main { padding: 48px 20px; }
  .ty-btn { width: 100%; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="cf-header">
  <div class="cf-header-in">
    <div class="cf-brand">
      <span class="cf-brand-name">Luis A. Farrera</span>
      <span class="cf-brand-sub">Consent &amp; Release Form</span>
    </div>
    <span class="cf-badge">Soho · New York</span>
  </div>
</header>

<div class="cf-divider"></div>

<!-- MAIN -->
<main class="ty-main">
  <div class="ty-card">

    <div class="ty-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1 class="ty-headline">You're<br>All Set</h1>

    <div class="ty-rule"></div>

    <p class="ty-body">
      Your consent form has been signed and submitted.<br>
      Alex will be in touch shortly to confirm your session.
    </p>

    <a href="https://luisfarreratattoo.com/portfolio" class="ty-btn">View Portfolio</a>

  </div>
</main>

<!-- FOOTER -->
<footer class="cf-footer">
  <p>© 2026 <span>Luis A. Farrera Tattoo</span> · 132 Crosby St, 4th Floor, Soho, New York</p>
</footer>

</body>
</html>
