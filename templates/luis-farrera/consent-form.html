<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050505;
  --panel: #0d0d0d;
  --text: #f4f1eb;
  --muted: rgba(244,241,235,.62);
  --soft: rgba(244,241,235,.38);
  --line: rgba(255,255,255,.08);
  --gold: #cfa947;
  --gold2: #e2c66f;
  --display: 'Bebas Neue', sans-serif;
  --serif: 'Cormorant Garamond', serif;
  --body: 'Inter', sans-serif;
}

html {
  background: var(--bg);
  overflow-x: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.cf-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5,5,5,.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}

.cf-header-in {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.cf-brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cf-brand-name {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.cf-brand-sub {
  font-family: var(--body);
  font-style: normal;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold2);
  line-height: 1;
}

.cf-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--soft);
}

.cf-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

/* ── GOLD DIVIDER ── */
.cf-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* ── FORM WRAPPER ── */
.cf-form-wrap {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 0 40px;
}

/* ── IFRAME ── */
.cf-iframe-container {
  width: 100%;
}

.cf-iframe-container iframe {
  display: block;
  width: 100%;
  border: none;
}

/* ── FOOTER LINE ── */
.cf-footer {
  text-align: center;
  padding: 20px 24px 32px;
  border-top: 1px solid var(--line);
}

.cf-footer p {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--soft);
  letter-spacing: 0.5px;
}

.cf-footer span {
  color: var(--gold2);
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .cf-header-in {
    padding: 0 16px;
    min-height: 56px;
  }
  .cf-brand-name { font-size: 15px; letter-spacing: 2px; }
  .cf-brand-sub { font-size: 11px; }
  .cf-badge { font-size: 9px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="cf-header">
  <div class="cf-header-in">
    <div class="cf-brand">
      <span class="cf-brand-name">Luis A. Farrera</span>
      <span class="cf-brand-sub">Consent &amp; Release Form</span>
    </div>
    <span class="cf-badge">Soho · New York</span>
  </div>
</header>

<div class="cf-divider"></div>

<!-- FORM -->
<div class="cf-form-wrap">
  <div class="cf-iframe-container">
    <iframe
      src="https://links.jrzmarketing.com/widget/form/C93Jp4PcC4mvE1l8ZP6v"
      style="width:100%;height:100%;border:none;border-radius:3px"

      data-layout="{'id':'INLINE'}"
      data-trigger-type="alwaysShow"

      data-activation-type="alwaysActivated"

      data-height="1845"
      data-layout-iframe-id="inline-C93Jp4PcC4mvE1l8ZP6v"
      data-form-id="C93Jp4PcC4mvE1l8ZP6v"
      title="CONSENT AND RELEASE FORM"
    ></iframe>
    <script src="https://links.jrzmarketing.com/js/form_embed.js"></script>
  </div>
</div>

<!-- FOOTER -->
<footer class="cf-footer">
  <p>© 2026 <span>Luis A. Farrera Tattoo</span> · 132 Crosby St, 4th Floor, Soho, New York</p>
</footer>

</body>
</html>
